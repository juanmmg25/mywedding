<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" type="image/x-icon" href="../invitacion/assets/img/favicon_wedding.ico">
  <title>Intro</title>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Vertical */
    #videoVertical {
      display: none;
    }

    @media (max-width: 768px) {

      #videoHorizontal {
        display: none;
      }

      #videoVertical {
        display: block;
      }
    }
  </style>
</head>

<body>

  <!-- VIDEO HORIZONTAL -->
  <video id="videoHorizontal" autoplay muted playsinline>
    <source src="../video/abrir_invitacion.mp4" type="video/mp4">
  </video>

  <!-- VIDEO VERTICAL -->
  <video id="videoVertical" autoplay muted playsinline>
    <source src="../video/abrir_invitacion_vertical.mp4" type="video/mp4">
  </video>

  <script>

    // Detectar móvil
    const esMovil = window.matchMedia("(max-width: 768px)").matches;

    // Seleccionar video correcto
    const video = esMovil
      ? document.getElementById("videoVertical")
      : document.getElementById("videoHorizontal");

    // Cuando termine el video
    video.addEventListener("ended", () => {

      // Redirigir
      window.location.href = "../intro/index.html";

    });

  </script>

</body>

</html>
